[tox]
envlist = py310, py311, py312, py313, cpu, coverage, quality, security, complexity
isolated_build = True

[testenv]
deps =
    -e .[gpu]
    pytest>=8.4.2,<9.0.0
    pytest-cov>=7.0.0,<8.0.0
setenv =
    COVERAGE_FILE = {toxworkdir}/.coverage.{envname}
    LD_LIBRARY_PATH = {envsitepackagesdir}/nvidia/cudnn/lib:{envsitepackagesdir}/nvidia/cublas/lib:{envsitepackagesdir}/nvidia/cuda_runtime/lib:{env:LD_LIBRARY_PATH:}
commands =
    pytest {posargs:tests/ -v --cov=veespeech --cov-report=term-missing --cov-report=html --cov-report=xml}

[testenv:py310]
basepython = python3.10

[testenv:py311]
basepython = python3.11

[testenv:py312]
basepython = python3.12

[testenv:py313]
basepython = python3.13

[testenv:cpu]
basepython = python3.13
deps =
    --extra-index-url https://download.pytorch.org/whl/cpu
    -e .[cpu]
    pytest>=8.4.2,<9.0.0
    pytest-cov>=7.0.0,<8.0.0
setenv =
    COVERAGE_FILE = {toxworkdir}/.coverage.{envname}
commands =
    pytest {posargs:tests/ -v --cov=veespeech --cov-report=term-missing --cov-report=html --cov-report=xml}

[testenv:coverage]
basepython = python3.13
deps =
    coverage
skip_install = True
commands =
    coverage combine \
        {toxworkdir}/.coverage.py310 \
        {toxworkdir}/.coverage.py311 \
        {toxworkdir}/.coverage.py312 \
        {toxworkdir}/.coverage.py313 \
        {toxworkdir}/.coverage.cpu
    coverage report --show-missing
    coverage html

[testenv:quality]
basepython = python3.13
deps =
    --extra-index-url https://download.pytorch.org/whl/cpu
    -e .[cpu]
    isort>=6.1.0,<7.0.0
    flake8>=7.1.1,<8.0.0
    mypy>=1.11.0,<2.0.0
skip_install = False
commands =
    flake8 veespeech/
    mypy veespeech/

[testenv:security]
basepython = python3.13
deps =
    bandit>=1.7.10,<2.0.0
    safety>=3.2.0,<4.0.0
skip_install = True
passenv =
    SAFETY_API_KEY
commands =
    bandit -r veespeech/
    safety scan --key "${SAFETY_API_KEY}"

[testenv:complexity]
basepython = python3.13
deps =
    radon>=6.0.1,<7.0.0
skip_install = True
commands =
    radon cc veespeech/ --min B
    radon mi veespeech/ --min B
